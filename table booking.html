<section class="contact">

<h1>Restaurant Table Reservation</h1>

<div class="booking-form">

<form id="tableBookingForm">

<label>Name</label>

<input type="text" id="customerName">

<label>Email</label>

<input type="email" id="customerEmail">

<label>Phone Number</label>

<input type="tel" id="customerPhone">

<label>Reservation Date</label>

<input type="date" id="bookingDate">

<label>Reservation Time</label>

<input type="time" id="bookingTime">

<label>Number of Guests</label>

<input type="number" id="tableGuests" min="1" max="20">

<label>Table Type</label>

<select id="tableType">

<option value="">Select Table</option>

<option>Indoor Table</option>

<option>Outdoor Garden Table</option>

<option>Poolside Table</option>

<option>Family Table</option>

<option>VIP Dining Table</option>

</select>

<label>Special Request</label>

<textarea id="specialRequest" rows="4" placeholder="Birthday, Anniversary, Decorations, etc."></textarea>

<button type="submit">

Reserve Table

</button>

</form>

</div>

</section>
